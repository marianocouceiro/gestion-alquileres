<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GestAlquiler — Iniciar sesión</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d0d0d;color:#f5f5f5;
     min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#151515;border:1px solid rgba(255,255,255,.08);border-radius:16px;
      padding:2.5rem 2rem;width:100%;max-width:380px;margin:1rem}
.logo{display:flex;align-items:center;gap:.75rem;margin-bottom:2rem}
.logo-ico{width:44px;height:44px;background:rgba(245,124,0,.15);border:1px solid rgba(245,124,0,.35);
          border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.logo-name{font-size:.95rem;font-weight:700;color:#fff}
.logo-sub{font-size:.72rem;color:#717171}
h2{font-size:1.1rem;font-weight:700;margin-bottom:.3rem}
.sub{font-size:.78rem;color:#717171;margin-bottom:1.8rem}
.fl{display:flex;flex-direction:column;gap:.28rem;margin-bottom:1rem}
label{font-size:.72rem;font-weight:600;color:#b0b0b0;text-transform:uppercase;letter-spacing:.4px}
.inp{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:9px;
     padding:.6rem .9rem;font-size:.9rem;color:#f5f5f5;font-family:inherit;width:100%;
     transition:border-color .15s;color-scheme:dark}
.inp:focus{outline:none;border-color:#f57c00}
.btn{width:100%;background:linear-gradient(135deg,#f57c00,#ff9800);color:#fff;border:none;
     border-radius:9px;padding:.7rem;font-size:.95rem;font-weight:700;cursor:pointer;
     font-family:inherit;transition:opacity .2s;margin-top:.5rem}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.45;cursor:not-allowed}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;
     border-radius:8px;padding:.55rem .9rem;font-size:.8rem;margin-top:.8rem;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-ico">🏘️</div>
    <div><div class="logo-name">GestAlquiler</div>
         <div class="logo-sub">Sistema de gestión inmobiliaria</div></div>
  </div>
  <h2>Iniciar sesión</h2>
  <p class="sub">Ingresá con tu cuenta de la inmobiliaria</p>
  <div class="fl">
    <label>Email</label>
    <input class="inp" type="email" id="email" placeholder="tu@email.com" autocomplete="email">
  </div>
  <div class="fl">
    <label>Contraseña</label>
    <input class="inp" type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="btnLogin">Entrar</button>
  <div style="text-align:center;margin-top:.9rem">
    <button type="button" id="btnForgot" onclick="openForgot()"
      style="background:none;border:none;color:#717171;font-size:.78rem;cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:2px">
      ¿Olvidaste tu contraseña?
    </button>
  </div>
  <div style="text-align:center;margin-top:1.4rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,.06)">
    <p style="font-size:.7rem;color:#4a4a4a;line-height:1.6">
      Al iniciar sesión aceptás nuestros<br>
      <a href="terminos.html" target="_blank" style="color:#666;text-decoration:underline">Términos y Condiciones</a>
      &nbsp;y&nbsp;
      <a href="privacidad.html" target="_blank" style="color:#666;text-decoration:underline">Política de Privacidad</a>
    </p>
  </div>
  <div class="err" id="errMsg"></div>
</div>

<!-- Modal recuperación de contraseña -->
<div id="modalForgot" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:center;justify-content:center">
  <div style="background:#151515;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:2rem;width:100%;max-width:360px;margin:1rem">
    <h3 style="font-size:1rem;font-weight:700;margin-bottom:.4rem;color:#f5f5f5">Recuperar contraseña</h3>
    <p style="font-size:.78rem;color:#717171;margin-bottom:1.2rem;line-height:1.5">Ingresá tu email y te mandamos un link para restablecer tu contraseña.</p>
    <div class="fl">
      <label>Email</label>
      <input class="inp" type="email" id="forgotEmail" placeholder="tu@email.com" autocomplete="email">
    </div>
    <button id="btnSendReset" onclick="submitForgot()"
      style="width:100%;background:linear-gradient(135deg,#f57c00,#ff9800);color:#fff;border:none;border-radius:9px;padding:.65rem;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s;margin-top:.3rem">
      Enviar link
    </button>
    <button onclick="closeForgot()"
      style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#b0b0b0;border-radius:9px;padding:.6rem;font-size:.85rem;cursor:pointer;font-family:inherit;margin-top:.5rem">
      Cancelar
    </button>
    <p id="forgotMsg" style="margin-top:.8rem;font-size:.78rem;text-align:center;display:none;line-height:1.5"></p>
  </div>
</div>
<script>
'use strict';
const SB = 'https://ratkgsxlqjjhjcclpcee.supabase.co';
const KEY = 'sb_publishable_frPLdQ7k0nOOP5JsULLU-g_XEPjc1Bv';

// Si ya tiene sesión válida, redirigir directo
const stored = localStorage.getItem('ga_session');
if (stored) {
  try {
    const s = JSON.parse(stored);
    if (s.expires_at > Date.now()/1000 + 60) {
      window.location.replace('dashboard.html');
    }
  } catch {}
}

document.getElementById('btnLogin').onclick = async () => {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const btn   = document.getElementById('btnLogin');
  const err   = document.getElementById('errMsg');
  if (!email || !pass) { showErr('Completá email y contraseña.'); return; }

  btn.disabled = true; btn.textContent = 'Entrando…'; err.style.display = 'none';

  try {
    const r = await fetch(`${SB}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const d = await r.json();
    if (!r.ok || !d.access_token) throw new Error(d.error_description || d.msg || 'Error de autenticación');
    
    localStorage.setItem('ga_session', JSON.stringify({
      access_token: d.access_token,
      refresh_token: d.refresh_token,
      expires_at: Math.floor(Date.now()/1000) + (d.expires_in || 3600),
      user_email: d.user?.email || email,
    }));
    window.location.replace('dashboard.html');
  } catch(e) {
    showErr(e.message.includes('Invalid login') ? 'Email o contraseña incorrectos.' : e.message);
    btn.disabled = false; btn.textContent = 'Entrar';
  }
};

document.getElementById('pass').onkeydown = e => { if(e.key==='Enter') document.getElementById('btnLogin').click(); };
document.getElementById('email').onkeydown = e => { if(e.key==='Enter') document.getElementById('pass').focus(); };

// ── Recuperar contraseña ──────────────────────────────────────────────────
function openForgot() {
  const modal = document.getElementById('modalForgot');
  modal.style.display = 'flex';
  // Pre-rellenar con el email si ya lo escribieron
  const emailVal = document.getElementById('email').value.trim();
  if (emailVal) document.getElementById('forgotEmail').value = emailVal;
  document.getElementById('forgotEmail').focus();
  document.getElementById('forgotMsg').style.display = 'none';
}

function closeForgot() {
  document.getElementById('modalForgot').style.display = 'none';
  document.getElementById('forgotEmail').value = '';
  document.getElementById('forgotMsg').style.display = 'none';
  document.getElementById('btnSendReset').disabled = false;
  document.getElementById('btnSendReset').textContent = 'Enviar link';
}

async function submitForgot() {
  const email  = document.getElementById('forgotEmail').value.trim();
  const msgEl  = document.getElementById('forgotMsg');
  const btnR   = document.getElementById('btnSendReset');

  if (!email) {
    msgEl.textContent = 'Ingresá un email válido.';
    msgEl.style.color = '#ef4444';
    msgEl.style.display = 'block';
    return;
  }

  btnR.disabled = true;
  btnR.textContent = 'Enviando…';
  msgEl.style.display = 'none';

  try {
    // Supabase REST API: POST /auth/v1/recover
    const r = await fetch(`${SB}/auth/v1/recover`, {
      method: 'POST',
      headers: { 'apikey': KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    // Supabase devuelve 200 incluso si el email no existe (por seguridad)
    if (!r.ok) throw new Error('Error al enviar');

    msgEl.textContent = '✅ Email enviado. Revisá tu bandeja (y la carpeta spam).';
    msgEl.style.color = '#22c55e';
    msgEl.style.display = 'block';
    setTimeout(closeForgot, 4000);
  } catch(e) {
    msgEl.textContent = 'No se pudo enviar. Intentá de nuevo.';
    msgEl.style.color = '#ef4444';
    msgEl.style.display = 'block';
    btnR.disabled = false;
    btnR.textContent = 'Enviar link';
  }
}

// Cerrar modal con Escape o clic fuera
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeForgot(); });
document.getElementById('modalForgot').addEventListener('click', function(e) {
  if (e.target === this) closeForgot();
});

function showErr(msg) {
  const e = document.getElementById('errMsg');
  e.textContent = msg; e.style.display = 'block';
}
</script>
</body>
</html>
