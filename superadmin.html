<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>GestAlquiler — Superadmin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="logger.js"></script><script src="shared.js"></script><script src="supabase.js"></script>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0d0d0d;--bg2:#151515;--bg3:#1c1c1c;--txt:#f5f5f5;--muted:#717171;--acc:#f57c00;--ok:#10b981;--danger:#ef4444;--info:#378ADD;--border:rgba(255,255,255,.08);--rad:12px;--tr:.18s cubic-bezier(.4,0,.2,1)}html{font-size:15px;background:var(--bg)}body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:2rem}.badge{display:inline-block;font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:20px}.badge-super{background:rgba(245,124,0,.15);color:var(--acc);border:1px solid rgba(245,124,0,.3)}.badge-ok{background:rgba(16,185,129,.12);color:var(--ok)}.badge-off{background:rgba(239,68,68,.12);color:var(--danger)}.grid{display:grid;grid-template-columns:340px 1fr;gap:1.5rem;align-items:start}.card{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--rad);padding:1.4rem}.card h2{color:var(--acc);font-size:.85rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1rem}.lbl{display:block;font-size:.72rem;font-weight:500;color:var(--muted);margin-bottom:.3rem;margin-top:.8rem}.lbl:first-child{margin-top:0}.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.55rem .75rem;color:var(--txt);font-size:.82rem;outline:none;transition:border var(--tr)}.inp:focus{border-color:var(--acc)}select.inp option{background:var(--bg3)}.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.1rem;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:all var(--tr)}.btn-prim{background:var(--acc);color:#fff}.btn-prim:hover{opacity:.88}.btn-sec{background:var(--bg3);color:var(--txt);border:1px solid var(--border)}.btn-sec:hover{border-color:var(--acc);color:var(--acc)}.btn-danger{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.2)}.btn:disabled{opacity:.45;cursor:not-allowed}.msg{font-size:.75rem;margin-top:.5rem;padding:.4rem .7rem;border-radius:6px}.msg-ok{background:rgba(16,185,129,.1);color:var(--ok)}.msg-err{background:rgba(239,68,68,.1);color:var(--danger)}.org-item{background:var(--bg3);border:.5px solid var(--border);border-radius:10px;padding:.9rem 1rem;margin-bottom:.6rem;cursor:pointer;transition:border var(--tr)}.org-item:hover,.org-item.active{border-color:var(--acc)}.org-item.active{background:rgba(245,124,0,.12)}.org-name{font-size:.9rem;font-weight:600}.org-meta{font-size:.72rem;color:var(--muted);margin-top:.2rem}table{width:100%;border-collapse:collapse;font-size:.8rem}th{text-align:left;font-size:.7rem;font-weight:500;color:var(--muted);padding:.5rem .7rem;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.4px}td{padding:.6rem .7rem;border-bottom:.5px solid var(--border);vertical-align:middle}tr:last-child td{border-bottom:none}tr:hover td{background:var(--bg3)}.role-badge{font-size:.68rem;font-weight:600;padding:2px 8px;border-radius:20px}.role-admin{background:rgba(245,124,0,.15);color:var(--acc)}.role-operador{background:rgba(55,138,221,.15);color:var(--info)}.role-readonly{background:rgba(113,113,113,.15);color:var(--muted)}.empty{text-align:center;color:var(--muted);padding:2rem;font-size:.82rem}.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}.divider{height:1px;background:var(--border);margin:1.2rem 0}.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}.modal-bg.open{display:flex}.modal{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--rad);padding:1.6rem;width:420px;max-width:95vw}.modal h3{font-size:1rem;font-weight:600;margin-bottom:1.2rem}.modal-btns{display:flex;gap:.6rem;margin-top:1.2rem;justify-content:flex-end}#loginWall{display:flex;position:fixed;inset:0;background:var(--bg);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:1rem}.spin{display:inline-block;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style>
</head><body>
<div id="loginWall"><div style="text-align:center"><div style="font-size:3rem;margin-bottom:1rem">🔐</div><h2 id="wallMsg" style="font-size:1.2rem">Verificando acceso…</h2><p id="wallSub" style="color:var(--muted);font-size:.85rem;margin-top:.4rem">Solo superadmins pueden acceder.</p><a href="login.html" style="color:var(--acc);font-size:.85rem;display:inline-block;margin-top:1rem">← Volver al login</a></div></div>
<div id="app" style="display:none;max-width:1100px;margin:0 auto">
<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem"><div><div style="display:flex;align-items:center;gap:.7rem;margin-bottom:.3rem"><h1 style="font-size:1.4rem;font-weight:700">🏢 GestAlquiler — Panel Superadmin</h1><span class="badge badge-super">SUPERADMIN</span></div><p style="font-size:.8rem;color:var(--muted)">Gestión de inmobiliarias y sus usuarios.</p></div><div style="display:flex;gap:.6rem;align-items:center"><span id="adminEmail" style="font-size:.75rem;color:var(--muted)"></span><a href="dashboard.html" class="btn btn-sec" style="text-decoration:none">← App</a></div></div>
<div class="grid"><div><div class="card"><h2>📋 Inmobiliarias</h2><div id="orgList"><div style="color:var(--muted);padding:1rem"><span class="spin">⌛</span> Cargando…</div></div><div class="divider"></div><button class="btn btn-prim" style="width:100%" onclick="openNewOrg()">＋ Nueva inmobiliaria</button></div></div><div id="orgDetail"><div class="card" style="text-align:center;color:var(--muted);padding:3rem"><div style="font-size:2.5rem;margin-bottom:.8rem">👈</div><div>Seleccioná una inmobiliaria</div></div></div></div></div>
<div class="modal-bg" id="modalOrg"><div class="modal"><h3>🏢 Nueva inmobiliaria</h3><label class="lbl">Nombre *</label><input class="inp" id="newOrgName" placeholder="Ej: García Propiedades" maxlength="80"><label class="lbl">Slug (auto)</label><input class="inp" id="newOrgSlug" placeholder="auto" maxlength="40"><div id="msgOrg"></div><div class="modal-btns"><button class="btn btn-sec" onclick="closeModal('modalOrg')">Cancelar</button><button class="btn btn-prim" id="btnCreateOrg" onclick="createOrg()">Crear</button></div></div></div>
<div class="modal-bg" id="modalUser"><div class="modal"><h3 id="modalUserTitle">👤 Nuevo usuario</h3><label class="lbl">Email *</label><input class="inp" id="newUserEmail" type="email" placeholder="usuario@email.com"><label class="lbl">Contraseña *</label><input class="inp" id="newUserPass" type="password" placeholder="Mínimo 8 caracteres"><label class="lbl">Nombre</label><input class="inp" id="newUserName" placeholder="Nombre y apellido"><label class="lbl">Rol</label><select class="inp" id="newUserRole"><option value="admin">Admin — acceso total</option><option value="operador" selected>Operador</option><option value="readonly">Solo lectura</option></select><div id="msgUser"></div><div class="modal-btns"><button class="btn btn-sec" onclick="closeModal('modalUser')">Cancelar</button><button class="btn btn-prim" id="btnCreateUser" onclick="createUser()">Crear usuario</button></div></div></div>
<div class="modal-bg" id="modalReset"><div class="modal"><h3>🔑 Nueva contraseña</h3><p id="resetUserLabel" style="font-size:.8rem;color:var(--muted);margin-bottom:.8rem"></p><label class="lbl">Nueva contraseña *</label><input class="inp" id="resetPass" type="password" placeholder="Mínimo 8 caracteres"><div id="msgReset"></div><div class="modal-btns"><button class="btn btn-sec" onclick="closeModal('modalReset')">Cancelar</button><button class="btn btn-prim" id="btnReset" onclick="doResetPassword()">Actualizar</button></div></div></div>
<script>'use strict';
var SB_URL='https://ratkgsxlqjjhjcclpcee.supabase.co',SB_KEY='sb_publishable_frPLdQ7k0nOOP5JsULLU-g_XEPjc1Bv';
var FN_URL=SB_URL+'/functions/v1/gestalquiler-admin';
var _token='',_selOrg=null,_resetId='';
var $=function(id){return document.getElementById(id);};
function toast(msg,ok){var d=document.createElement('div');d.style.cssText='position:fixed;bottom:1.2rem;right:1.2rem;background:'+(ok===false?'var(--danger)':'var(--ok)')+';color:#fff;padding:.6rem 1.1rem;border-radius:8px;font-size:.82rem;z-index:999;font-weight:500';d.textContent=msg;document.body.appendChild(d);setTimeout(function(){d.remove();},3500);}
function setMsg(id,msg,ok){var el=$(id);el.className='msg '+(ok===false?'msg-err':'msg-ok');el.textContent=msg;}
function clearMsg(id){$(id).textContent='';$(id).className='';}
async function callFn(body){var r=await fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+_token,'apikey':SB_KEY},body:JSON.stringify(body)});var d=await r.json();if(!r.ok||d.error)throw new Error(d.error||'HTTP '+r.status);return d;}
async function init(){try{var s=JSON.parse(localStorage.getItem('ga_session')||'{}');if(!s.access_token)throw new Error('no');if(s.expires_at&&s.expires_at<Date.now()/1000+30)throw new Error('exp');_token=s.access_token;var p=JSON.parse(atob(_token.split('.')[1]));if(!p||!p.app_metadata||!p.app_metadata.superadmin)throw new Error('ns');$('adminEmail').textContent=s.user_email||p.email||'';$('loginWall').style.display='none';$('app').style.display='block';loadOrgs();}catch(e){$('loginWall').style.display='flex';if(e.message==='ns'){$('wallMsg').textContent='Acceso denegado';$('wallSub').textContent='Solo para el administrador del sistema.';}else{$('wallMsg').textContent='Sesión no válida';$('wallSub').textContent='Iniciá sesión primero.';}}}
async function loadOrgs(){$('orgList').innerHTML='<div style="color:var(--muted);padding:1rem"><span class="spin">⌛</span> Cargando…</div>';try{var res=await callFn({action:'list_orgs'});renderOrgList(res.orgs);}catch(e){$('orgList').innerHTML='<div class="msg msg-err">'+e.message+'</div>';}}
function renderOrgList(orgs){if(!orgs||!orgs.length){$('orgList').innerHTML='<div class="empty">Sin inmobiliarias.</div>';return;}$('orgList').innerHTML=orgs.map(function(o){return '<div class="org-item'+((_selOrg&&_selOrg.id===o.id)?' active':'')+'" onclick="selectOrg(this,'+JSON.stringify(o).replace(/"/g,'&quot;')+')"><div style="display:flex;align-items:center;justify-content:space-between"><div class="org-name">'+o.name+'</div><span class="badge '+(o.active?'badge-ok':'badge-off')+'">'+(o.active?'Activa':'Suspendida')+'</span></div><div class="org-meta">'+(o.slug||'')+' · '+new Date(o.created_at).toLocaleDateString('es-AR')+'</div></div>';}).join('');}
function selectOrg(el,org){_selOrg=org;document.querySelectorAll('.org-item').forEach(function(x){x.classList.remove('active');});el.classList.add('active');loadOrgUsers(org);}
async function loadOrgUsers(org){$('orgDetail').innerHTML='<div class="card"><div class="section-head"><div><h2>👥 '+org.name+'</h2><div style="font-size:.73rem;color:var(--muted)">'+org.id+'</div></div><div style="display:flex;gap:.5rem"><button class="btn btn-'+(org.active?'danger':'sec')+'" onclick="toggleOrg(\''+org.id+'\','+((!org.active)+'')+')">'+  (org.active?'⏸ Suspender':'▶ Activar')+'</button><button class="btn btn-prim" onclick="openNewUser()">＋ Agregar usuario</button></div></div><div id="userTableWrap"><div style="color:var(--muted);padding:1rem"><span class="spin">⌛</span> Cargando…</div></div></div>';try{var res=await callFn({action:'list_users',org_id:org.id});renderUserTable(res.users);}catch(e){$('userTableWrap').innerHTML='<div class="msg msg-err">'+e.message+'</div>';}}
function renderUserTable(users){if(!users||!users.length){$('userTableWrap').innerHTML='<div class="empty">Sin usuarios todavía.</div>';return;}$('userTableWrap').innerHTML='<table><thead><tr><th>Email</th><th>Rol</th><th>Último acceso</th><th>Acciones</th></tr></thead><tbody>'+users.map(function(u){return '<tr><td>'+u.email+'</td><td><span class="role-badge role-'+u.role+'">'+u.role+'</span></td><td>'+(u.last_sign_in?new Date(u.last_sign_in).toLocaleDateString('es-AR'):'—')+'</td><td><button class="btn btn-sec" style="font-size:.72rem;padding:.3rem .6rem" onclick="openResetPassword(\''+u.id+'\',\''+u.email+'\')">🔑 Contraseña</button> <button class="btn btn-danger" style="font-size:.72rem;padding:.3rem .6rem" onclick="deleteUser(\''+u.id+'\',\''+u.email+'\')">✕</button></td></tr>';}).join('')+'</tbody></table>';}
function openNewOrg(){$('newOrgName').value='';$('newOrgSlug').value='';clearMsg('msgOrg');$('modalOrg').classList.add('open');setTimeout(function(){$('newOrgName').focus();},100);}
async function createOrg(){var name=$('newOrgName').value.trim();var slug=$('newOrgSlug').value.trim()||name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');if(!name){setMsg('msgOrg','El nombre es obligatorio.',false);return;}var btn=$('btnCreateOrg');btn.disabled=true;btn.textContent='⏳ Creando…';clearMsg('msgOrg');try{await callFn({action:'create_org',name:name,slug:slug});toast('✓ Inmobiliaria creada');closeModal('modalOrg');loadOrgs();}catch(e){setMsg('msgOrg',e.message,false);}finally{btn.disabled=false;btn.textContent='Crear';}}
function openNewUser(){if(!_selOrg)return;$('newUserEmail').value='';$('newUserPass').value='';$('newUserName').value='';$('newUserRole').value='operador';$('modalUserTitle').textContent='👤 Nuevo usuario — '+_selOrg.name;clearMsg('msgUser');$('modalUser').classList.add('open');setTimeout(function(){$('newUserEmail').focus();},100);}
async function createUser(){var email=$('newUserEmail').value.trim(),pass=$('newUserPass').value,name=$('newUserName').value.trim(),role=$('newUserRole').value;if(!email||!pass){setMsg('msgUser','Email y contraseña son obligatorios.',false);return;}if(pass.length<8){setMsg('msgUser','Mínimo 8 caracteres.',false);return;}var btn=$('btnCreateUser');btn.disabled=true;btn.textContent='⏳…';clearMsg('msgUser');try{await callFn({action:'create_user',email:email,password:pass,name:name,role:role,org_id:_selOrg.id});toast('✓ Usuario creado');closeModal('modalUser');loadOrgUsers(_selOrg);}catch(e){setMsg('msgUser',e.message,false);}finally{btn.disabled=false;btn.textContent='Crear usuario';}}
async function toggleOrg(org_id,active){if(!confirm(active?'¿Activar esta inmobiliaria?':'¿Suspender esta inmobiliaria?'))return;try{await callFn({action:'toggle_org',org_id:org_id,active:active});toast('✓ '+(active?'Activada':'Suspendida'));_selOrg.active=active;loadOrgs();loadOrgUsers(_selOrg);}catch(e){toast(e.message,false);}}
function openResetPassword(uid,email){_resetId=uid;$('resetUserLabel').textContent='Usuario: '+email;$('resetPass').value='';clearMsg('msgReset');$('modalReset').classList.add('open');setTimeout(function(){$('resetPass').focus();},100);}
async function doResetPassword(){var pass=$('resetPass').value;if(pass.length<8){setMsg('msgReset','Mínimo 8 caracteres.',false);return;}var btn=$('btnReset');btn.disabled=true;btn.textContent='⏳…';clearMsg('msgReset');try{await callFn({action:'reset_password',user_id:_resetId,new_password:pass});toast('✓ Contraseña actualizada');closeModal('modalReset');}catch(e){setMsg('msgReset',e.message,false);}finally{btn.disabled=false;btn.textContent='Actualizar';}}
async function deleteUser(uid,email){if(!confirm('¿Eliminar '+email+'?'))return;try{await callFn({action:'delete_user',user_id:uid});toast('✓ Eliminado');loadOrgUsers(_selOrg);}catch(e){toast(e.message,false);}}
function closeModal(id){$(id).classList.remove('open');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')document.querySelectorAll('.modal-bg.open').forEach(function(m){m.classList.remove('open');});});
$('newOrgName').addEventListener('input',function(e){if(!$('newOrgSlug').value)$('newOrgSlug').placeholder=e.target.value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'slug-automatico';});
init();</script>
</body></html>
