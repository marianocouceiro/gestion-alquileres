<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GestAlquiler — Administración</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d0d0d;color:#f5f5f5;
     min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#151515;border:1px solid rgba(255,255,255,.08);border-radius:16px;
      padding:2.5rem 2rem;width:100%;max-width:360px;margin:1rem}
.logo{display:flex;align-items:center;gap:.75rem;margin-bottom:2rem}
.logo-ico{width:44px;height:44px;background:rgba(245,124,0,.15);border:1px solid rgba(245,124,0,.35);
          border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.logo-name{font-size:.95rem;font-weight:700;color:#fff}
.logo-sub{font-size:.72rem;color:#717171}
.badge{display:inline-block;background:rgba(245,124,0,.15);border:1px solid rgba(245,124,0,.3);
       color:#f57c00;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:20px;
       letter-spacing:.05em;margin-bottom:1.5rem}
h2{font-size:1.1rem;font-weight:700;margin-bottom:.3rem}
.sub{font-size:.78rem;color:#717171;margin-bottom:1.8rem}
.fl{display:flex;flex-direction:column;gap:.28rem;margin-bottom:1rem}
label{font-size:.72rem;font-weight:600;color:#b0b0b0;text-transform:uppercase;letter-spacing:.4px}
.inp{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:9px;
     padding:.6rem .9rem;font-size:.9rem;color:#f5f5f5;font-family:inherit;width:100%;
     transition:border-color .15s;color-scheme:dark}
.inp:focus{outline:none;border-color:#f57c00}
.btn{width:100%;background:linear-gradient(135deg,#f57c00,#ff9800);color:#fff;border:none;
     border-radius:9px;padding:.7rem;font-size:.95rem;font-weight:700;cursor:pointer;
     font-family:inherit;transition:opacity .2s;margin-top:.5rem}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.45;cursor:not-allowed}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;
     border-radius:8px;padding:.55rem .9rem;font-size:.8rem;margin-top:.8rem;display:none}
.divider{border:none;border-top:1px solid rgba(255,255,255,.06);margin:1.5rem 0}
.btn-sec{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
         color:#b0b0b0;border-radius:9px;padding:.6rem;font-size:.82rem;cursor:pointer;
         font-family:inherit;width:100%;transition:all .2s}
.btn-sec:hover{border-color:rgba(245,124,0,.4);color:#f57c00}

/* Panel cambio de clave */
#changePassPanel{display:none}
#changePassPanel h3{font-size:.9rem;font-weight:700;margin-bottom:1rem;color:#fff}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-ico">⚙️</div>
    <div><div class="logo-name">GestAlquiler</div>
         <div class="logo-sub">Panel de administración</div></div>
  </div>
  <div class="badge">SUPERADMIN</div>

  <!-- LOGIN PANEL -->
  <div id="loginPanel">
    <h2>Acceso restringido</h2>
    <p class="sub">Solo para administradores del sistema</p>
    <div class="fl">
      <label>Usuario</label>
      <input class="inp" type="email" id="saEmail" placeholder="admin@gestalquiler.com" autocomplete="email">
    </div>
    <div class="fl">
      <label>Contraseña</label>
      <input class="inp" type="password" id="saPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="btnLogin">Ingresar</button>
    <div class="err" id="errMsg"></div>
    <div class="divider"></div>
    <button class="btn-sec" onclick="showChangePass()">🔑 Cambiar mi contraseña</button>
  </div>

  <!-- CAMBIO DE CONTRASEÑA -->
  <div id="changePassPanel">
    <h3>🔑 Cambiar contraseña</h3>
    <div class="fl">
      <label>Email</label>
      <input class="inp" type="email" id="cpEmail" placeholder="superadmin@gestalquiler.com">
    </div>
    <div class="fl">
      <label>Contraseña actual</label>
      <input class="inp" type="password" id="cpOld" placeholder="••••••••">
    </div>
    <div class="fl">
      <label>Nueva contraseña</label>
      <input class="inp" type="password" id="cpNew" placeholder="Mínimo 8 caracteres">
    </div>
    <div class="fl">
      <label>Confirmar nueva contraseña</label>
      <input class="inp" type="password" id="cpNew2" placeholder="Repetí la nueva contraseña">
    </div>
    <button class="btn" id="btnChangePass">Cambiar contraseña</button>
    <div class="err" id="errPass"></div>
    <div class="divider"></div>
    <button class="btn-sec" onclick="showLogin()">← Volver al login</button>
  </div>
</div>

<script>
'use strict';
const SB  = 'https://ratkgsxlqjjhjcclpcee.supabase.co';
const KEY = 'sb_publishable_frPLdQ7k0nOOP5JsULLU-g_XEPjc1Bv';
const SA_SESSION_KEY = 'ga_sa_session'; // sesión separada del superadmin

// Si ya tiene sesión de superadmin válida, ir directo al panel
const stored = localStorage.getItem(SA_SESSION_KEY);
if (stored) {
  try {
    const s = JSON.parse(stored);
    if (s.expires_at > Date.now()/1000 + 60) {
      window.location.replace('superadmin.html');
    } else {
      localStorage.removeItem(SA_SESSION_KEY);
    }
  } catch { localStorage.removeItem(SA_SESSION_KEY); }
}

// ── Login ──────────────────────────────────────────────────
document.getElementById('btnLogin').onclick = async () => {
  const email = document.getElementById('saEmail').value.trim();
  const pass  = document.getElementById('saPass').value;
  const btn   = document.getElementById('btnLogin');
  const err   = document.getElementById('errMsg');
  if (!email || !pass) { showErr('errMsg', 'Completá usuario y contraseña.'); return; }

  btn.disabled = true; btn.textContent = 'Verificando…'; err.style.display = 'none';

  try {
    const r = await fetch(`${SB}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const d = await r.json();
    if (!r.ok || !d.access_token) throw new Error(d.error_description || 'Error de autenticación');

    // Verificar que es superadmin
    const payload = JSON.parse(atob(d.access_token.split('.')[1]));
    if (!payload?.app_metadata?.superadmin) {
      throw new Error('no_superadmin');
    }

    // Guardar sesión en clave separada
    localStorage.setItem(SA_SESSION_KEY, JSON.stringify({
      access_token:  d.access_token,
      refresh_token: d.refresh_token,
      expires_at:    Math.floor(Date.now()/1000) + (d.expires_in || 3600),
      user_email:    d.user?.email || email,
    }));

    window.location.replace('superadmin.html');

  } catch(e) {
    const msg = e.message === 'no_superadmin'
      ? 'Este usuario no tiene permisos de administrador.'
      : e.message.includes('Invalid login') ? 'Usuario o contraseña incorrectos.' : e.message;
    showErr('errMsg', msg);
    btn.disabled = false; btn.textContent = 'Ingresar';
  }
};

document.getElementById('saPass').onkeydown = e => { if(e.key==='Enter') document.getElementById('btnLogin').click(); };
document.getElementById('saEmail').onkeydown = e => { if(e.key==='Enter') document.getElementById('saPass').focus(); };

// ── Cambio de contraseña ───────────────────────────────────
function showChangePass() {
  document.getElementById('loginPanel').style.display = 'none';
  document.getElementById('changePassPanel').style.display = 'block';
}
function showLogin() {
  document.getElementById('changePassPanel').style.display = 'none';
  document.getElementById('loginPanel').style.display = 'block';
}

document.getElementById('btnChangePass').onclick = async () => {
  const email = document.getElementById('cpEmail').value.trim();
  const oldP  = document.getElementById('cpOld').value;
  const newP  = document.getElementById('cpNew').value;
  const newP2 = document.getElementById('cpNew2').value;
  const btn   = document.getElementById('btnChangePass');

  if (!email || !oldP || !newP || !newP2) { showErr('errPass', 'Completá todos los campos.'); return; }
  if (newP.length < 8) { showErr('errPass', 'La nueva contraseña debe tener al menos 8 caracteres.'); return; }
  if (newP !== newP2) { showErr('errPass', 'Las contraseñas no coinciden.'); return; }

  btn.disabled = true; btn.textContent = 'Cambiando…';

  try {
    // 1. Verificar contraseña actual
    const r1 = await fetch(`${SB}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: oldP })
    });
    const d1 = await r1.json();
    if (!r1.ok || !d1.access_token) throw new Error('Contraseña actual incorrecta.');

    // 2. Verificar que es superadmin
    const payload = JSON.parse(atob(d1.access_token.split('.')[1]));
    if (!payload?.app_metadata?.superadmin) throw new Error('Usuario sin permisos de superadmin.');

    // 3. Cambiar contraseña
    const r2 = await fetch(`${SB}/auth/v1/user`, {
      method: 'PUT',
      headers: {
        'apikey': KEY,
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${d1.access_token}`
      },
      body: JSON.stringify({ password: newP })
    });
    if (!r2.ok) throw new Error('Error al cambiar la contraseña.');

    // Éxito
    document.getElementById('errPass').style.display = 'none';
    btn.textContent = '✅ Contraseña cambiada';
    btn.style.background = 'linear-gradient(135deg,#16a34a,#22c55e)';
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = 'Cambiar contraseña';
      btn.style.background = '';
      showLogin();
    }, 2000);

  } catch(e) {
    showErr('errPass', e.message);
    btn.disabled = false; btn.textContent = 'Cambiar contraseña';
  }
};

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
}
</script>
</body>
</html>
