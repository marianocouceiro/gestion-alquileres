<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cristian Sanchez Propiedades — Tareas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="logger.js"></script>
  <script src="shared.js"></script>
  <script src="supabase.js"></script>
  <script>(function(){var fs=parseInt(localStorage.getItem('app_fs'))||15;document.documentElement.style.fontSize=fs+'px';})()</script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0d0d;--bg2:#151515;--bg3:#1c1c1c;--bg4:#252525;
      --txt:#f5f5f5;--txt2:#b0b0b0;--muted:#717171;
      --acc:#f57c00;--glow:rgba(245,124,0,.28);--soft:rgba(245,124,0,.12);
      --ok:#10b981;--ok-s:rgba(16,185,129,.12);
      --warn:#f59e0b;--danger:#ef4444;
      --info:#378ADD;--info-s:rgba(55,138,221,.12);
      --border:rgba(255,255,255,.08);
      --grad:linear-gradient(135deg,#f57c00,#ff9800);
      --gh:linear-gradient(135deg,#0d0d0d 0%,#1a1206 50%,#0d0d0d 100%);
      --sh:0 4px 12px rgba(0,0,0,.5);
      --r:10px;--tr:.2s cubic-bezier(.4,0,.2,1);
    }
    html{font-size:15px;background:var(--bg)}
    body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.5;overflow-x:hidden}
    a{color:inherit;text-decoration:none}

    /* ── Header ── */
    .app-hdr{position:sticky;top:0;z-index:300;display:flex;align-items:center;justify-content:space-between;padding:.55rem 1.4rem;background:var(--gh);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);gap:.8rem;flex-wrap:wrap}
    .app-hdr-logo{display:flex;align-items:center;gap:.65rem;text-decoration:none;flex-shrink:0}
    .app-hdr-ico{width:34px;height:34px;max-width:34px;max-height:34px;flex-shrink:0;border-radius:9px;overflow:hidden;border:1px solid rgba(245,124,0,.35);padding:2px;background:rgba(245,124,0,.1)}
    .app-hdr-ico svg{width:30px;height:30px;display:block}
    .app-hdr-name{font-family:'Inter',-apple-system,sans-serif;font-size:.88rem;font-weight:700;color:#fff;line-height:1.2}
    .app-hdr-sub{font-family:'Inter',-apple-system,sans-serif;font-size:.64rem;color:#717171;line-height:1}
    .app-hdr-nav{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
    .nav-lnk{display:inline-flex;align-items:center;gap:.3rem;padding:.35rem .75rem;border-radius:8px;font-size:.76rem;font-weight:600;color:rgba(245,124,0,.85);background:rgba(245,124,0,.1);border:1px solid rgba(245,124,0,.22);text-decoration:none;cursor:pointer;transition:background .15s,border-color .15s;white-space:nowrap}
    .nav-lnk:hover{background:rgba(245,124,0,.22);color:#f57c00;border-color:rgba(245,124,0,.45)}
    .nav-lnk.active{background:rgba(245,124,0,.25)!important;color:#ff9800!important;border-color:rgba(245,124,0,.6)!important}
    .nav-font{display:flex;align-items:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;overflow:hidden;flex-shrink:0}
    .nav-font button{background:none;border:none;color:#b0b0b0;cursor:pointer;padding:.28rem .48rem;font-size:.8rem;font-weight:600}
    .nav-font button:hover{color:#f57c00;background:rgba(245,124,0,.1)}

    /* ── Layout ── */
    .wrap{max-width:900px;margin:0 auto;padding:1.4rem 1.2rem}
    .page-title{font-size:1.4rem;font-weight:800;color:var(--txt);margin-bottom:1rem}

    /* ── Toolbar ── */
    .toolbar{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1rem;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
    .btn-primary{background:var(--grad);color:#fff}
    .btn-primary:hover{opacity:.88}
    .btn-sm{padding:.3rem .65rem;font-size:.74rem}
    .btn-ghost{background:transparent;color:var(--txt2);border:1px solid var(--border)}
    .btn-ghost:hover{background:var(--bg3);color:var(--txt)}
    .btn-danger{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
    .btn-danger:hover{background:rgba(239,68,68,.22)}
    .btn-ok{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.2)}
    .btn-ok:hover{background:rgba(16,185,129,.22)}

    /* ── Filters ── */
    .filters{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
    .filt{padding:.3rem .75rem;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--txt2);transition:all .15s}
    .filt:hover{border-color:var(--acc);color:var(--acc)}
    .filt.on{background:var(--soft);border-color:var(--acc);color:var(--acc)}
    .filt.filt-alta.on{background:rgba(239,68,68,.12);border-color:#ef4444;color:#ef4444}
    .filt.filt-media.on{background:rgba(245,158,11,.12);border-color:#f59e0b;color:#f59e0b}
    .filt.filt-baja.on{background:rgba(16,185,129,.12);border-color:#10b981;color:#10b981}

    /* ── Cards ── */
    .tareas-list{display:flex;flex-direction:column;gap:.5rem}
    .tarea-card{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem 1rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);transition:border-color .15s}
    .tarea-card:hover{border-color:rgba(245,124,0,.3)}
    .tarea-card.completada{opacity:.5}
    .tarea-card.completada .tarea-texto{text-decoration:line-through;color:var(--muted)}
    .prio-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:.35rem}
    .tarea-body{flex:1;min-width:0}
    .tarea-texto{font-size:.88rem;font-weight:500;color:var(--txt);word-break:break-word}
    .tarea-meta{display:flex;gap:.6rem;margin-top:.3rem;flex-wrap:wrap;align-items:center}
    .prio-badge{font-size:.66rem;font-weight:700;padding:.12rem .4rem;border-radius:4px}
    .tarea-obs{font-size:.75rem;color:var(--muted);margin-top:.25rem;word-break:break-word}
    .tarea-fecha{font-size:.72rem;color:var(--muted)}
    .tarea-actions{display:flex;gap:.35rem;flex-shrink:0;align-items:flex-start}
    .icon-btn{background:none;border:none;cursor:pointer;padding:.25rem;border-radius:6px;font-size:.9rem;opacity:.6;transition:opacity .15s}
    .icon-btn:hover{opacity:1;background:var(--bg3)}

    /* ── Empty ── */
    .empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:.88rem}

    /* ── Modal ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.5rem;width:min(480px,96vw);max-height:90vh;overflow-y:auto}
    .modal-title{font-size:1rem;font-weight:700;margin-bottom:1.2rem;color:var(--txt)}
    .form-row{margin-bottom:.9rem}
    label{display:block;font-size:.76rem;font-weight:600;color:var(--txt2);margin-bottom:.35rem}
    input[type=text],input[type=date],textarea,select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;color:var(--txt);font-family:inherit;font-size:.84rem;outline:none;transition:border-color .15s}
    input[type=text]:focus,input[type=date]:focus,textarea:focus,select:focus{border-color:var(--acc)}
    textarea{resize:vertical;min-height:70px}
    select option{background:var(--bg3)}
    .modal-actions{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1.2rem}

    /* ── Toast ── */
    #toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:.4rem}
    .toast-msg{padding:.55rem 1rem;border-radius:8px;font-size:.8rem;font-weight:600;animation:slideIn .2s ease;box-shadow:var(--sh)}
    .toast-ok{background:#10b981;color:#fff}
    .toast-err{background:#ef4444;color:#fff}
    .toast-info{background:var(--acc);color:#fff}
    @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}

    /* ── Stats bar ── */
    .stats-bar{display:flex;gap:.75rem;margin-bottom:1.1rem;flex-wrap:wrap}
    .stat-chip{padding:.35rem .75rem;border-radius:8px;font-size:.75rem;font-weight:600;background:var(--bg2);border:1px solid var(--border)}
    .stat-chip span{color:var(--acc);font-size:.9rem;margin-left:.3rem}
  </style>
</head>

<script>
const $ = id => document.getElementById(id);
let tareas = [];
let filtroActivo = 'todas';

/* ── Colores y labels de prioridad ── */
const PRIO_COLOR = { alta:'#ef4444', media:'#f59e0b', baja:'#10b981' };
const PRIO_BG    = { alta:'rgba(239,68,68,.12)', media:'rgba(245,158,11,.12)', baja:'rgba(16,185,129,.12)' };
const PRIO_LABEL = { alta:'Alta', media:'Media', baja:'Baja' };

/* ── Toast ── */
function toast(msg, type='info') {
  const d = document.createElement('div');
  d.className = `toast-msg toast-${type}`;
  d.textContent = msg;
  $('toast').appendChild(d);
  setTimeout(() => d.remove(), 3000);
}

/* ── Generar ID único ── */
function genId() { return 'tar_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

/* ── Cargar tareas ── */
async function loadTareas() {
  try {
    tareas = await SupabaseDB.getTareas();
  } catch(e) {
    console.error('[Tareas]', e);
    tareas = [];
    toast('Error al cargar tareas', 'err');
  }
  renderStats();
  renderList();
}

/* ── Estadísticas ── */
function renderStats() {
  $('stTotal').textContent = tareas.length;
  $('stPend').textContent  = tareas.filter(t => !t.completada).length;
  $('stComp').textContent  = tareas.filter(t => t.completada).length;
  $('stAlta').textContent  = tareas.filter(t => !t.completada && t.prioridad === 'alta').length;
}

/* ── Filtrar ── */
function setFilter(f) {
  filtroActivo = f;
  document.querySelectorAll('.filt').forEach(b => b.classList.toggle('on', b.dataset.f === f));
  renderList();
}

function getFiltered() {
  return tareas.filter(t => {
    if (filtroActivo === 'pendientes')  return !t.completada;
    if (filtroActivo === 'completadas') return  t.completada;
    if (filtroActivo === 'alta')   return !t.completada && t.prioridad === 'alta';
    if (filtroActivo === 'media')  return !t.completada && t.prioridad === 'media';
    if (filtroActivo === 'baja')   return !t.completada && t.prioridad === 'baja';
    return true; // todas
  }).sort((a, b) => {
    // Pendientes antes que completadas
    if (a.completada !== b.completada) return a.completada ? 1 : -1;
    // Por prioridad
    const o = { alta:0, media:1, baja:2 };
    const po = (o[a.prioridad]||1) - (o[b.prioridad]||1);
    if (po !== 0) return po;
    // Por fecha
    return (a.fecha || '9999') < (b.fecha || '9999') ? -1 : 1;
  });
}

/* ── Render lista ── */
function renderList() {
  const filtered = getFiltered();
  const el = $('tareasList');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty">Sin tareas para este filtro</div>';
    return;
  }
  el.innerHTML = filtered.map(t => {
    const col = PRIO_COLOR[t.prioridad] || '#f59e0b';
    const bg  = PRIO_BG[t.prioridad]   || 'rgba(245,158,11,.12)';
    const lbl = PRIO_LABEL[t.prioridad] || 'Media';
    const fmtFecha = t.fecha ? new Date(t.fecha + 'T00:00:00').toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric'}) : '';
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const fechaVencida = t.fecha && !t.completada && new Date(t.fecha + 'T00:00:00') < hoy;
    return `<div class="tarea-card${t.completada ? ' completada' : ''}" id="card-${t.id}">
      <div class="prio-dot" style="background:${col}"></div>
      <div class="tarea-body">
        <div class="tarea-texto">${esc(t.texto || '—')}</div>
        <div class="tarea-meta">
          <span class="prio-badge" style="background:${bg};color:${col}">${lbl}</span>
          ${fmtFecha ? `<span class="tarea-fecha" style="${fechaVencida ? 'color:#ef4444;font-weight:600' : ''}">${fechaVencida ? '⚠ ' : ''}${fmtFecha}</span>` : ''}
          ${t.completada ? '<span style="font-size:.68rem;color:#10b981;font-weight:600">✔ Completada</span>' : ''}
        </div>
        ${t.observaciones ? `<div class="tarea-obs">${esc(t.observaciones)}</div>` : ''}
      </div>
      <div class="tarea-actions">
        ${!t.completada
          ? `<button class="icon-btn btn-ok" title="Marcar completada" onclick="completar('${t.id}')">✔</button>`
          : `<button class="icon-btn" title="Marcar pendiente" onclick="reabrir('${t.id}')" style="font-size:.8rem">↩</button>`
        }
        <button class="icon-btn" title="Editar" onclick="editTarea('${t.id}')">✏️</button>
        <button class="icon-btn btn-danger" title="Eliminar" onclick="deleteTarea('${t.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Completar / Reabrir ── */
async function completar(id) {
  const t = tareas.find(x => x.id === id);
  if (!t) return;
  t.completada = true;
  try {
    await SupabaseDB.upsertTarea(t);
    toast('Tarea completada ✔', 'ok');
  } catch(e) { toast('Error al guardar', 'err'); }
  renderStats();
  renderList();
}

async function reabrir(id) {
  const t = tareas.find(x => x.id === id);
  if (!t) return;
  t.completada = false;
  try {
    await SupabaseDB.upsertTarea(t);
    toast('Tarea reabierta', 'info');
  } catch(e) { toast('Error al guardar', 'err'); }
  renderStats();
  renderList();
}

/* ── Eliminar ── */
async function deleteTarea(id) {
  if (!confirm('¿Eliminar esta tarea?')) return;
  try {
    await SupabaseDB.deleteTarea(id);
    tareas = tareas.filter(t => t.id !== id);
    toast('Tarea eliminada', 'info');
  } catch(e) { toast('Error al eliminar', 'err'); }
  renderStats();
  renderList();
}

/* ── Modal ── */
function openModal(t = null) {
  $('editId').value    = t ? t.id : '';
  $('fTexto').value    = t ? (t.texto || '') : '';
  $('fObs').value      = t ? (t.observaciones || '') : '';
  $('fPrio').value     = t ? (t.prioridad || 'media') : 'media';
  $('fFecha').value    = t ? (t.fecha || '') : '';
  $('modalTitle').textContent = t ? 'Editar tarea' : 'Nueva tarea';
  $('modalOverlay').classList.add('open');
  setTimeout(() => $('fTexto').focus(), 80);
}

function closeModal() {
  $('modalOverlay').classList.remove('open');
}

function editTarea(id) {
  const t = tareas.find(x => x.id === id);
  if (t) openModal(t);
}

async function saveTarea() {
  const texto = $('fTexto').value.trim();
  if (!texto) { toast('Ingresá el texto de la tarea', 'err'); $('fTexto').focus(); return; }
  const id = $('editId').value || genId();
  const existing = tareas.find(t => t.id === id);
  const tarea = {
    ...(existing || {}),
    id,
    texto,
    observaciones: $('fObs').value.trim(),
    prioridad: $('fPrio').value,
    fecha: $('fFecha').value || null,
    completada: existing ? existing.completada : false,
    createdAt: existing ? existing.createdAt : new Date().toISOString(),
  };
  try {
    await SupabaseDB.upsertTarea(tarea);
    if (existing) {
      Object.assign(existing, tarea);
    } else {
      tareas.unshift(tarea);
    }
    toast(existing ? 'Tarea actualizada' : 'Tarea creada ✔', 'ok');
    closeModal();
  } catch(e) {
    console.error(e);
    toast('Error al guardar tarea', 'err');
  }
  renderStats();
  renderList();
}

/* ── Enter en el formulario ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && e.ctrlKey && $('modalOverlay').classList.contains('open')) saveTarea();
});

/* ── Init ── */
document.addEventListener('DOMContentLoaded', async () => {
  (function(){var fs=parseInt(localStorage.getItem('app_fs'))||15;document.documentElement.style.fontSize=fs+'px';})();
  try { if (window._gsReady) await window._gsReady; } catch {}
  await loadTareas();
});
</script>
</body>
</html>
